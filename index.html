<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/fastmet_icon.png" />

    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap"

    <title>FastMet – Fast & Reliable Delivery Service in Metro Manila</title>

      property="og:title"

      name="twitter:title"
